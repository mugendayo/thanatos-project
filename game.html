<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title id="page-title">FIELD — THANATOS GAMES WORLD</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ===== VARIABLES ===== */
:root {
  --rpg-bg:       #00001e;
  --rpg-border:   #8888ff;
  --rpg-text:     #ffffff;
  --rpg-yellow:   #ffdd00;
  --rpg-dim:      #8888bb;
  --active-green: #00ee55;
  --active-red:   #ee2200;
  --menu-bg:      rgba(0, 0, 28, 0.94);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1a6fad;
  font-family: 'Noto Serif JP', serif;
  cursor: default;
  user-select: none;
}

#world {
  position: relative;
  width: 100vw;
  height: 100vh;
  height: 100dvh; /* Android/iOS: ブラウザUIを除いた実際の表示領域 */
  overflow: hidden;
}

/* ===== OCEAN / WAVE BASE ===== */
#ocean {
  position: absolute; inset: 0;
  background: #1a6fad;
}
.wave-layer {
  position: absolute; inset: -20%;
  background: repeating-linear-gradient(
    -20deg,
    transparent 0px, transparent 22px,
    rgba(100,200,255,0.08) 22px, rgba(100,200,255,0.08) 24px
  );
  animation: driftWave 14s ease-in-out infinite;
}
.wave-layer:nth-child(2) {
  opacity: .50;
  animation-duration: 22s;
  animation-direction: reverse;
  background: repeating-linear-gradient(
    160deg,
    transparent 0px, transparent 30px,
    rgba(140,220,255,0.06) 30px, rgba(140,220,255,0.06) 32px
  );
}
@keyframes driftWave {
  0%,100% { transform: translate(0,0); }
  50%      { transform: translate(12px, 8px); }
}

/* ===== FIELD SVG ===== */
#field-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

/* ===== HUD TOP ===== */
#hud-top {
  position: absolute; top: 0; left: 0; right: 0;
  height: 40px;
  background: var(--menu-bg);
  border-bottom: 3px solid var(--rpg-border);
  display: flex; align-items: center; justify-content: center;
  z-index: 20;
  pointer-events: all;
  cursor: pointer;
  transition: background .2s;
}
#hud-top:hover {
  background: rgba(10, 20, 60, 0.97);
}
.world-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 1.3vw, 12px);
  color: var(--rpg-yellow);
  letter-spacing: .10em;
  text-shadow: 2px 2px 0 #000033;
  text-align: center;
  animation: fieldTitlePulse 1.6s ease-in-out infinite;
}

/* ===== FF7R 風タイトル点滅アニメーション ===== */
@keyframes fieldTitlePulse {
  0%, 100% {
    color: var(--rpg-yellow);
    text-shadow: 2px 2px 0 #000033;
  }
  50% {
    color: #ffffff;
    text-shadow:
      0 0 8px rgba(120,200,255,1.0),
      0 0 20px rgba(80,160,255,0.65),
      2px 2px 0 #000033;
  }
}
@keyframes fieldSubPulse {
  0%, 100% { color: var(--rpg-dim); }
  50% {
    color: #7ecfff;
    text-shadow: 0 0 8px rgba(126,207,255,0.55);
  }
}

/* ===== HUD BOTTOM ===== */
#hud-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 38px;
  background: var(--menu-bg);
  border-top: 3px solid var(--rpg-border);
  display: flex; align-items: center; justify-content: center; gap: 44px;
  z-index: 20; pointer-events: none;
}
.hint {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; color: var(--rpg-dim);
  letter-spacing: .06em;
}

/* ===== LEFT MENU ===== */
#left-menu {
  position: absolute; top: 54px; left: 14px;
  display: flex; flex-direction: column; gap: 6px;
  z-index: 20;
}
.menu-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--rpg-yellow);
  background: var(--menu-bg);
  border: 2px solid var(--rpg-border);
  padding: 9px 13px;
  cursor: pointer;
  letter-spacing: .10em;
  text-align: left;
  transition: border-color .15s, color .15s, box-shadow .15s;
  box-shadow: 0 0 4px rgba(136,136,255,.20);
}
.menu-btn:hover {
  border-color: #00bcd4;
  color: #00bcd4;
  box-shadow: 0 0 10px rgba(0,188,212,.35);
}

/* ===== FIELD ICON (非表示 — ヘッダークリックに統合済み) ===== */
#field-marker { display: none; }

/* ===== CHARACTERS ===== */
#characters {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 8;
}
.character-sprite {
  position: absolute;
  pointer-events: all;
  cursor: pointer;
  transform: translateX(-50%);
}
.character-sprite img {
  display: block;
  width: 260px;
  max-width: 28vw;
  filter: drop-shadow(4px 8px 10px rgba(0,0,0,0.65));
  animation: charIdle 4s ease-in-out infinite;
  transition: filter 0.15s, transform 0.15s;
  user-select: none;
}
.character-sprite:hover img {
  filter: drop-shadow(4px 8px 18px rgba(0,188,212,0.7));
  transform: scale(1.04) translateY(-4px);
}
@keyframes charIdle {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
.char-hint {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  color: #ffdd00;
  text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,200,0,0.6);
  animation: hintBounce 0.9s ease-in-out infinite;
  pointer-events: none;
}
@keyframes hintBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(-6px); }
}
.char-hint.done { display: none; }

/* ===== DIALOGUE BOX ===== */
#dialogue-box {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  width: min(720px, 92vw);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  transform: translateX(-50%) translateY(10px);
}
#dialogue-box.open {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
.dlg-inner {
  background: rgba(4, 4, 28, 0.97);
  border: 2px solid #00bcd4;
  border-left: 4px solid #00bcd4;
  outline: 1px solid rgba(0,188,212,0.2);
  outline-offset: 3px;
  box-shadow: 0 0 28px rgba(0,188,212,0.18), 0 10px 40px rgba(0,0,0,0.8);
  padding: 14px 44px 14px 18px;
  position: relative;
  min-height: 80px;
}
.dlg-name {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: #f5a623;
  margin-bottom: 10px;
  letter-spacing: .08em;
  display: flex; align-items: center; gap: 6px;
}
.dlg-name::before { content: '▶'; color: #00bcd4; font-size: 7px; }
.dlg-text {
  font-size: 14px;
  color: #e8e8ff;
  line-height: 2.0;
  min-height: 32px;
  font-family: 'Noto Serif JP', serif;
  white-space: pre-line;
}
.dlg-next {
  position: absolute;
  bottom: 10px;
  right: 14px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #00bcd4;
  opacity: 0;
  animation: dlgNextBlink 0.75s step-end infinite;
  pointer-events: none;
  transition: opacity 0.15s;
}
.dlg-next.visible { opacity: 1; }
@keyframes dlgNextBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}
.dlg-close {
  position: absolute;
  top: 10px; right: 10px;
  background: none;
  border: 1px solid rgba(0,188,212,.4);
  color: #00bcd4;
  width: 24px; height: 24px;
  cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.dlg-close:hover { background: rgba(0,188,212,.18); }

/* ===== MODAL OVERLAY ===== */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,20,.82);
  backdrop-filter: blur(3px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
#overlay.open { opacity: 1; pointer-events: all; }

/* ===== MODAL BOX ===== */
#modal {
  width: min(900px, 95vw);
  max-height: 80vh;
  background: rgba(10,10,40,0.92);
  border: 1px solid rgba(0,188,212,0.3);
  border-left: 3px solid #00bcd4;
  box-shadow:
    0 24px 64px rgba(0,0,0,.75),
    0 0 40px rgba(0,188,212,.12),
    inset 0 0 60px rgba(0,10,40,.30);
  display: flex; flex-direction: column;
  transform: translateY(20px);
  opacity: 0;
  transition: transform .25s ease-out, opacity .25s ease-out;
  overflow: hidden;
  position: relative;
}
#overlay.open #modal {
  transform: translateY(0);
  opacity: 1;
}

/* ===== MODAL HEADER ===== */
.m-head {
  padding: 16px 20px 14px;
  border-bottom: 1px solid rgba(0,188,212,0.25);
  background: linear-gradient(135deg, rgba(0,188,212,.08) 0%, rgba(10,10,40,0) 60%);
  display: flex; align-items: flex-start; gap: 14px;
}
.m-head-text { flex: 1; }
.m-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(10px, 1.8vw, 16px);
  color: #f5a623;
  margin-bottom: 8px;
  line-height: 1.6;
  letter-spacing: .04em;
}
.m-tagline {
  font-size: 12px;
  color: rgba(0,188,212,.80);
  line-height: 1.7;
}

/* ===== STATUS BADGE ===== */
.badge {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; padding: 5px 10px;
  border: 1px solid;
  white-space: nowrap; flex-shrink: 0; margin-top: 3px;
}
.badge.c {
  color: #ffffff;
  border-color: #00bcd4;
  background: rgba(0,188,212,.12);
  box-shadow: 0 0 8px rgba(0,188,212,.30);
}
.badge.a {
  color: #f5a623;
  border-color: #f5a623;
  background: rgba(245,166,35,.10);
  box-shadow: 0 0 8px rgba(245,166,35,.30);
  animation: badgePulse .9s ease-in-out infinite;
}
.badge.l { color: #556677; border-color: #334455; }
@keyframes badgePulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .55; }
}

/* ===== CLOSE BUTTON ===== */
.btn-close {
  background: none;
  border: 1px solid rgba(0,188,212,.5);
  color: #00bcd4;
  width: 30px; height: 30px;
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.btn-close:hover {
  background: rgba(0,188,212,.15);
  border-color: #00bcd4;
  box-shadow: 0 0 10px rgba(0,188,212,.35);
}

/* ===== MODAL BODY ===== */
.m-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ===== LEFT PANEL ===== */
.m-photos {
  width: 36%; flex-shrink: 0;
  border-right: 1px solid rgba(0,188,212,.22);
  display: flex; flex-direction: column; gap: 12px;
  padding: 16px 14px; overflow-y: auto;
  background: rgba(0,188,212,.03);
}
.game-icon-lg { font-size: 56px; text-align: center; padding: 12px 0 6px; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px; padding: 4px 9px;
  border: 1px solid rgba(0,188,212,.40);
  color: #e8e8ff;
  background: rgba(0,188,212,.08);
}
.review-card {
  background: rgba(0,188,212,.04);
  border: 1px solid rgba(0,188,212,.18);
  border-left: 3px solid #00bcd4;
  padding: 10px 12px; margin-bottom: 6px;
}
.review-body { font-size: 11px; color: #e8e8ff; line-height: 1.90; font-style: italic; }
.review-author {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px; color: rgba(0,188,212,.60);
  margin-top: 6px; text-align: right;
}

/* ===== RIGHT PANEL ===== */
.m-info {
  flex: 1; padding: 16px 18px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.sec {
  padding: 11px 14px;
  border: 1px solid rgba(0,188,212,.22);
  border-left: 3px solid #00bcd4;
  background: rgba(0,188,212,.04);
}
.sec-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; color: #00bcd4;
  letter-spacing: .12em; margin-bottom: 9px;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 7px;
}
.sec-label::before { content: '▶'; color: #f5a623; font-size: 6px; }
.sec-text { font-size: 12px; color: #e8e8ff; line-height: 1.95; }
.next-ev {
  display: flex; align-items: center; gap: 10px;
  background: rgba(245,166,35,.07);
  border: 1px solid rgba(245,166,35,.40);
  padding: 10px 13px;
  animation: nextEvPulse 2.4s ease-in-out infinite;
}
@keyframes nextEvPulse {
  0%, 100% { box-shadow: 0 0 6px  rgba(245,166,35,.15); }
  50%       { box-shadow: 0 0 18px rgba(245,166,35,.38); }
}
.next-ev-txt {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; color: #f5a623; line-height: 1.9;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: rgba(10,10,40,.8); }
::-webkit-scrollbar-thumb { background: rgba(0,188,212,.45); }
::-webkit-scrollbar-thumb:hover { background: rgba(0,188,212,.75); }

/* ===== SCENE HOTSPOT (field interactive objects) ===== */
.scene-hotspot { cursor: pointer; }
.scene-hotspot .obj-hint {
  opacity: 0;
  transition: opacity 0.2s;
}
.scene-hotspot:hover .obj-hint { opacity: 1; }
.hotspot-hover-glow {
  opacity: 0;
  transition: opacity 0.2s;
}
.scene-hotspot:hover .hotspot-hover-glow { opacity: 0.12; }

/* ===== STAGE TRANSITION ===== */
#field-svg { transition: opacity 0.25s ease; }
#field-svg.stage-fade { opacity: 0; }

/* ===== FIELD ENTRY ANIMATION (world→field) ===== */
#entry-overlay {
  position: fixed; inset: 0;
  background: #000010;
  z-index: 200;
  animation: entryFadeOut 0.55s cubic-bezier(0.4, 0, 0.6, 1) 0.05s forwards;
}
@keyframes entryFadeOut {
  0%   { opacity: 1; }
  100% { opacity: 0; pointer-events: none; }
}

/* ===== FIELD EXIT ANIMATION (field→world) ===== */
/* 入場より控えめな黒フェードアウト */
#exit-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 5, 30, 0.82);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease-in;
}
#exit-overlay.active {
  opacity: 1;
  pointer-events: all;
}

@keyframes worldReveal {
  0%   { transform: scale(1.07); }
  100% { transform: scale(1.0); }
}
#world {
  animation: worldReveal 0.6s cubic-bezier(0.25, 0, 0.3, 1) 0.05s both;
}
/* ===== /FIELD ENTRY ANIMATION ===== */

/* ===== 2D SIDE SCROLLER (clinic interior) ===== */
#side-scroller {
  /*
   * --floor-h: キャラクター・地面が立つ高さ（画面下端からの距離）
   * viewport相対値(vh)を使うことで全スマホサイズで一定の比率に配置される。
   * この変数を変えるだけで NPC・プレイヤー・地面ストリップすべてが連動する。
   */
  --floor-h: 40vh;

  display: none;
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 10;
  /* グラデーション: 空(上60%) + 川帯 + 地面(下38%)。--floor-h: 40vh に対応 */
  background: linear-gradient(
    to bottom,
    #7ec8e8 0%, #b0dcf4 52%,
    #5baed4 52%, #3a88bb 58%,
    #2a5a8a 58%, #3a6a2a 62%,
    #5a8040 62%, #4a7030 100%
  );
}
#side-scroller.active { display: block; }

/* Far parallax layer (clouds, distant treeline) */
#ss-far {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  width: 8000px;
  pointer-events: none;
  will-change: transform;
}

/* World layer (ground strip + NPCs) — scrolled by camera */
#ss-world {
  position: absolute;
  bottom: 0; left: 0;
  width: 8000px;
  height: 100%;
  will-change: transform;
}
#ss-ground-strip {
  position: absolute;
  bottom: 0; left: 0;
  width: 8000px;
  /* 地面ストリップは --floor-h の高さぶん画面下端を覆う */
  height: var(--floor-h);
  background: linear-gradient(to bottom, #6a9448 0%, #5a8040 100%);
  border-top: 4px solid #c4a870;
}

/* NPC objects */
.ss-npc {
  position: absolute;
  bottom: var(--floor-h);
  text-align: center;
  cursor: pointer;
}
.ss-npc-exclaim {
  position: absolute;
  top: -28px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Press Start 2P', monospace;
  font-size: 14px; color: #ffdd00;
  text-shadow: 2px 2px 0 #000;
  opacity: 0; pointer-events: none;
  animation: exclaimBounce 0.55s ease-in-out infinite;
  transition: opacity 0.2s;
}
.ss-npc.active .ss-npc-exclaim { opacity: 1; }
.ss-npc.active { filter: drop-shadow(0 0 7px rgba(255,220,0,0.75)); }
@keyframes exclaimBounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-5px); }
}
.ss-npc-label {
  display: block;
  font-family: 'Press Start 2P', monospace;
  font-size: 5px; color: #ffdd00;
  text-shadow: 1px 1px 0 #000;
  white-space: nowrap; margin-top: 5px;
}
.ss-npc-sublabel {
  display: block;
  font-family: 'Noto Serif JP', serif;
  font-size: 8px; color: rgba(255,255,255,0.72);
  white-space: nowrap;
}

/* NPC part: shared head / body */
.npc-head {
  width: 22px; height: 22px; border-radius: 50%;
  background: #f5c8a8; margin: 0 auto;
  border: 1px solid #d4a888;
}
.npc-body { margin: 0 auto; border-radius: 2px; }

/* Player character */
#ss-player {
  position: absolute;
  bottom: var(--floor-h);
  width: 28px;
  z-index: 15;
  pointer-events: none;
  will-change: left;
}
.ss-char { text-align: center; }
.ss-char-head {
  width: 22px; height: 22px; border-radius: 50%;
  background: #f5c8a8; margin: 0 auto;
  border: 2px solid #d4a888;
  position: relative;
}
.ss-char-head::before {
  content: '';
  position: absolute;
  top: -5px; left: 2px;
  width: 18px; height: 9px;
  background: #5a3a1a; border-radius: 50% 50% 0 0;
}
.ss-char-body {
  width: 16px; height: 22px; border-radius: 2px;
  background: #4a90d9; margin: 0 auto;
}
.ss-char-legs { display: flex; justify-content: center; gap: 2px; }
.ss-char-leg {
  width: 7px; height: 16px;
  background: #2a4a8a;
  border-radius: 0 0 2px 2px;
  transform-origin: top center;
}
.ss-char.walking .ss-char-leg:nth-child(1) { animation: legSwingL 0.35s ease-in-out infinite; }
.ss-char.walking .ss-char-leg:nth-child(2) { animation: legSwingR 0.35s ease-in-out infinite; }
.ss-char.flip { transform: scaleX(-1); }
@keyframes legSwingL {
  0%,100% { transform: rotate(20deg); }
  50%      { transform: rotate(-20deg); }
}
@keyframes legSwingR {
  0%,100% { transform: rotate(-20deg); }
  50%      { transform: rotate(20deg); }
}

/* D-pad: scroller内absoluteで全サイズ統一管理 */
#ss-dpad {
  display: flex;
  position: absolute;
  /* 3vh: PC/タブレットで地面エリア内の見やすい位置。モバイルはmedia queryで上書き */
  bottom: calc(3vh + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%);
  z-index: 25;
  flex-direction: row;
  gap: 24px;
  align-items: center;
  touch-action: none;
}
#ss-dpad.paused { display: none; }
.ss-dpad-btn {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(0, 15, 50, 0.88);
  border: 2px solid var(--rpg-border);
  color: var(--rpg-yellow);
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  box-shadow: 0 0 12px rgba(136,136,255,0.3);
  transition: background 0.1s, transform 0.1s;
  touch-action: manipulation;
}
.ss-dpad-btn.pressed {
  background: rgba(0, 80, 140, 0.92);
  transform: scale(0.9);
}

/* ===== DIALOGUE CHOICES ===== */
#dlg-choices {
  display: none;
  gap: 12px;
  justify-content: center;
  margin-top: 10px;
  flex-wrap: wrap;
}
#dlg-choices.visible { display: flex; }
.dlg-choice-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: #000033;
  background: var(--rpg-yellow);
  border: 2px solid #ccaa00;
  padding: 8px 18px;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: .08em;
  transition: background 0.1s, transform 0.1s;
}
.dlg-choice-btn:hover { background: #ffe850; transform: scale(1.05); }
.dlg-choice-btn:active { transform: scale(0.96); }

/* ===== RESPONSIVE ===== */
@media (max-width: 580px) {
  .m-body { flex-direction: column; }
  .m-photos {
    width: 100%; border-right: none;
    border-bottom: 1px solid rgba(0,188,212,.22);
    max-height: 180px;
  }
  .m-title { font-size: 10px; }
}

/* ===================================================
   スマホ共通: ダイアログ・D-pad・スクローラー
   =================================================== */
@media (max-width: 600px) {
  /*
   * モバイル地面を45vhに拡大（草エリアを広げてダイアログ・D-padを配置する余地を確保）
   * グラデーションも合わせて調整（空が上55%、草が下45%）
   */
  #side-scroller {
    --floor-h: 45vh;
    background: linear-gradient(
      to bottom,
      #7ec8e8 0%, #b0dcf4 46%,
      #5baed4 46%, #3a88bb 53%,
      #2a5a8a 53%, #3a6a2a 57%,
      #5a8040 57%, #4a7030 100%
    );
  }

  /*
   * ダイアログ: 草エリア内（28vh）に配置。固定サイズ。
   * - キャラクター名は非表示（スマホでは不要）
   * - dlg-text を 2行固定高さにすることでウィンドウサイズを一定に保つ
   * - セリフが長い場合はJS側で24文字ずつページ分割 → CLICK で続きが出る
   */
  #dialogue-box {
    bottom: 28vh;
    width: 92vw;
  }
  .dlg-name {
    display: none; /* スマホでは名前非表示 */
  }
  .dlg-inner {
    min-height: unset;
    padding: 14px 38px 14px 16px;
  }
  .dlg-text {
    font-size: 13px;
    line-height: 1.75;
    /* 2行分の高さに固定 — ウィンドウサイズが変わらない */
    height: calc(13px * 1.75 * 2);
    overflow: hidden;
    min-height: unset;
  }

  /*
   * D-pad: 12vh（草エリア下部・親指の届く高さ）
   * ボタン64px・間隔80px
   */
  #ss-dpad {
    bottom: calc(12vh + env(safe-area-inset-bottom, 0px));
    gap: 80px;
  }
  .ss-dpad-btn {
    width: 64px; height: 64px;
    font-size: 22px;
  }

  .ss-npc-label   { font-size: 4px; }
  .ss-npc-sublabel { font-size: 7px; }
}

/* 極小画面（iPhone SE等）*/
@media (max-width: 360px) {
  .ss-dpad-btn { width: 56px; height: 56px; font-size: 20px; }
  #ss-dpad { gap: 60px; }
}

/* 横向き */
@media (orientation: landscape) and (max-height: 480px) {
  #side-scroller { --floor-h: 48vh; }
  #ss-dpad { bottom: calc(14vh + env(safe-area-inset-bottom, 0px)); gap: 70px; }
  .ss-dpad-btn { width: 52px; height: 52px; font-size: 18px; }
  #dialogue-box  { bottom: 32vh; }
}
</style>

// =====================================================
//  MODAL
// =====================================================
function openModal(game) {
  const ui        = game.ui_display;
  const layout    = MAP_LAYOUT[game.game_id];
  const statusKey = (layout && layout.status) || game.internal_only.status;
  const st        = STATUS_UI[statusKey] || STATUS_UI.draft;

  document.getElementById('mtitle').textContent   = ui.title;
  document.getElementById('mtagline').textContent = ui.tagline || '—';
  const badge = document.getElementById('mbadge');
  badge.textContent = st.label;
  badge.className   = `badge ${st.cls}`;

  const pp = document.getElementById('mphotos');
  const reviewsHtml = (ui.reviews && ui.reviews.length > 0)
    ? `<div class="sec-label" style="margin-top:4px">口コミ</div>` +
      ui.reviews.map(r => `
        <div class="review-card">
          <div class="review-body">"${r.body}"</div>
          ${r.author ? `<div class="review-author">— ${r.author}</div>` : ''}
        </div>`).join('')
    : '';
  const tagsHtml = (ui.tags && ui.tags.length > 0)
    ? `<div class="sec-label">CATEGORY</div>
       <div class="tags">${ui.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`
    : '';
  pp.innerHTML = `
    <div class="game-icon-lg">${layout ? layout.icon : '?'}</div>
    ${tagsHtml}
    ${reviewsHtml}
  `;

  const rows = [];
  if (ui.summary) {
    rows.push(`<div class="sec">
      <div class="sec-label">STORY</div>
      <div class="sec-text">${ui.summary}</div>
    </div>`);
  }
  if (ui.venue && ui.venue.display_name) {
    rows.push(`<div class="sec">
      <div class="sec-label">開催地</div>
      <div class="sec-text">${ui.venue.display_name}</div>
    </div>`);
  }
  const nextLabel = (ui.next_event && (ui.next_event.label || ui.next_event.date));
  if (nextLabel) {
    rows.push(`<div class="sec">
      <div class="sec-label">NEXT QUEST</div>
      <div class="next-ev">
        <span>📅</span>
        <div class="next-ev-txt">${nextLabel}</div>
      </div>
    </div>`);
  }
  if (ui.latest_news && ui.latest_news.body) {
    rows.push(`<div class="sec">
      <div class="sec-label">最新情報</div>
      <div class="sec-text">${ui.latest_news.body}</div>
    </div>`);
  }
  if (ui.recent_update && ui.recent_update.body) {
    rows.push(`<div class="sec">
      <div class="sec-label">最近の更新</div>
      <div class="sec-text">${ui.recent_update.body}</div>
    </div>`);
  }
  if (!rows.length) {
    rows.push(`<div class="sec">
      <div class="sec-text" style="color:var(--rpg-dim)">詳細情報は準備中です。</div>
    </div>`);
  }
  document.getElementById('minfo').innerHTML = rows.join('');
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

// ── ゲーム状態 ──
const ssState = {
  playerX: 40, facingRight: true, moving: false,
  keyL: false, keyR: false, raf: null,
  _prevCamX: null, _prevWalking: null, _prevFlip: null,
};
const _ssH = {}; // event handler refs
const _ss  = {}; // cached DOM refs (populated in initSideScroller)
let   _ssVpW = 0; // cached viewport width

function buildSsNpcs() {
  const container = document.getElementById('ss-npcs');
  container.innerHTML = SS_NPC_DATA.map(npc => `
    <div class="ss-npc" id="ss-npc-${npc.id}"

      <span class="ss-npc-sublabel">${npc.sublabel}</span>
    </div>`).join('');
}

function buildSsFar() {
  const clouds = [
    {x:100,y:18,w:120,h:30},{x:520,y:42,w:95,h:26},{x:980,y:16,w:150,h:36},
    {x:1400,y:38,w:110,h:28},{x:1850,y:20,w:138,h:32},{x:2280,y:44,w:102,h:26},

    ).join('') +
    `<div style="position:absolute;bottom:0;left:0;width:100%;height:32px;background:#3a6a2a;opacity:0.45;"></div>`;

function initSideScroller() {
  // playerX = 250: 世界座標の中央左あたりからスタート。
  // カメラオフセット(camX ≈ 124)が生まれ、左にも背景が見えるため
  // 「背景が動く」感より「自分が動く」感覚になる。
  ssState.playerX = 250; ssState.facingRight = true;
  ssState.moving  = false; ssState.keyL = ssState.keyR = false;
  ssState._prevCamX = null; ssState._prevWalking = null; ssState._prevFlip = null;

  buildSsNpcs();
  buildSsFar();

  // DOM refs をキャッシュ（毎フレームのgetElementById呼び出しを排除）
  _ss.dlgBox  = document.getElementById('dialogue-box');
  _ss.dpad    = document.getElementById('ss-dpad');
  _ss.scroller= document.getElementById('side-scroller');
  _ss.world   = document.getElementById('ss-world');
  _ss.far     = document.getElementById('ss-far');
  _ss.player  = document.getElementById('ss-player');
  _ss.char    = document.getElementById('ss-char');
  _ss.npcEls  = {};
  SS_NPC_DATA.forEach(npc => {
    _ss.npcEls[npc.id] = document.getElementById('ss-npc-' + npc.id);
    _ss.npcEls[npc.id]._ssActive = false;
  });

  // .active を先に付けてから clientWidth を読む。
  // display:none のままだと clientWidth=0 になりカメラ計算が崩れるため。
  _ss.scroller.classList.add('active');
  _ssVpW = _ss.scroller.clientWidth || window.innerWidth;

  // NPC click（choicesを含めて渡す — ヒントマン対応）
  document.getElementById('ss-npcs').addEventListener('click', e => {
    const el = e.target.closest('.ss-npc');
    if (!el || !el.classList.contains('active')) return;
    const npc = SS_NPC_DATA.find(n => n.id === el.dataset.npc);
    if (npc) openDialogue({ id: npc.id, name: npc.name, dialogues: npc.dialogues, choices: npc.choices || null }, null);
  });

  setupSsInput();
  ssState.raf = requestAnimationFrame(ssLoop);
}

function destroySideScroller() {
  if (ssState.raf) { cancelAnimationFrame(ssState.raf); ssState.raf = null; }
  if (_ss.scroller) _ss.scroller.classList.remove('active');
  document.getElementById('ss-npcs').innerHTML = '';
  document.getElementById('ss-far').innerHTML  = '';
  teardownSsInput();
  closeDialogue();
}

// ── 入力 ──
function setupSsInput() {
  _ssH.kd = e => {
    if (e.key === 'ArrowLeft'  || e.key === 'a') ssState.keyL = true;
    if (e.key === 'ArrowRight' || e.key === 'd') ssState.keyR = true;
  };
  _ssH.ku = e => {
    if (e.key === 'ArrowLeft'  || e.key === 'a') ssState.keyL = false;
    if (e.key === 'ArrowRight' || e.key === 'd') ssState.keyR = false;
  };
  document.addEventListener('keydown', _ssH.kd);
  document.addEventListener('keyup',   _ssH.ku);

  const btnL = document.getElementById('ss-btn-l');
  const btnR = document.getElementById('ss-btn-r');
  _ssH.pL = e => { e.preventDefault(); ssState.keyL = true;  btnL.classList.add('pressed'); };
  _ssH.rL = ()=> { ssState.keyL = false; btnL.classList.remove('pressed'); };
  _ssH.pR = e => { e.preventDefault(); ssState.keyR = true;  btnR.classList.add('pressed'); };
  _ssH.rR = ()=> { ssState.keyR = false; btnR.classList.remove('pressed'); };
  btnL.addEventListener('mousedown',   _ssH.pL);
  btnL.addEventListener('touchstart',  _ssH.pL, { passive: false });
  btnL.addEventListener('mouseup',     _ssH.rL);
  btnL.addEventListener('mouseleave',  _ssH.rL);
  btnL.addEventListener('touchend',    _ssH.rL);
  btnL.addEventListener('touchcancel', _ssH.rL);
  btnR.addEventListener('mousedown',   _ssH.pR);
  btnR.addEventListener('touchstart',  _ssH.pR, { passive: false });
  btnR.addEventListener('mouseup',     _ssH.rR);
  btnR.addEventListener('mouseleave',  _ssH.rR);
  btnR.addEventListener('touchend',    _ssH.rR);
  btnR.addEventListener('touchcancel', _ssH.rR);
  _ssH.blur   = () => { ssState.keyL = ssState.keyR = false; btnL.classList.remove('pressed'); btnR.classList.remove('pressed'); };
  _ssH.resize = () => { if (_ss.scroller) _ssVpW = _ss.scroller.clientWidth; };
  window.addEventListener('blur',   _ssH.blur);
  window.addEventListener('resize', _ssH.resize);
}

function teardownSsInput() {
  document.removeEventListener('keydown', _ssH.kd);
  document.removeEventListener('keyup',   _ssH.ku);
  window.removeEventListener('blur',   _ssH.blur);
  window.removeEventListener('resize', _ssH.resize);
  const btnL = document.getElementById('ss-btn-l');
  const btnR = document.getElementById('ss-btn-r');
  if (_ssH.pL) {
    btnL.removeEventListener('mousedown',  _ssH.pL);
    btnL.removeEventListener('touchstart', _ssH.pL);
    btnL.removeEventListener('mouseup',    _ssH.rL);
    btnL.removeEventListener('mouseleave', _ssH.rL);
    btnL.removeEventListener('touchend',   _ssH.rL);
    btnL.removeEventListener('touchcancel',_ssH.rL);
    btnR.removeEventListener('mousedown',  _ssH.pR);
    btnR.removeEventListener('touchstart', _ssH.pR);
    btnR.removeEventListener('mouseup',    _ssH.rR);
    btnR.removeEventListener('mouseleave', _ssH.rR);
    btnR.removeEventListener('touchend',   _ssH.rR);
    btnR.removeEventListener('touchcancel',_ssH.rR);
  }
}

// ── ゲームループ（最適化版: DOMキャッシュ＋差分更新） ──
function ssLoop() {
  const dlgOpen = _ss.dlgBox.classList.contains('open');

  if (dlgOpen) {
    _ss.dpad.classList.add('paused');
    ssState.moving = false;
  } else {
    _ss.dpad.classList.remove('paused');
    if (ssState.keyL && ssState.playerX > 20) {
      ssState.playerX -= SS_SPEED;
      ssState.facingRight = false; ssState.moving = true;
    } else if (ssState.keyR && ssState.playerX < SS_WORLD_W - 20) {
      ssState.playerX += SS_SPEED;
      ssState.facingRight = true;  ssState.moving = true;
    } else {
      ssState.moving = false;
    }
  }

  // Proximity check — activeが変わったときのみclassList更新
  SS_NPC_DATA.forEach(npc => {
    const el   = _ss.npcEls[npc.id];
    if (!el) return;
    const near = Math.abs(ssState.playerX - npc.worldX) < SS_PROXIMITY;
    if (near !== el._ssActive) {
      el._ssActive = near;
      el.classList.toggle('active', near);
    }
  });

  // Camera — camXが変わったときのみtransform更新
  const camX = Math.max(0, Math.min(ssState.playerX - _ssVpW * 0.35, SS_WORLD_W - _ssVpW));
  if (camX !== ssState._prevCamX) {
    _ss.world.style.transform = `translateX(${-camX}px)`;
    _ss.far.style.transform   = `translateX(${-camX * 0.38}px)`;
    ssState._prevCamX = camX;
  }

  // Player position — 変化があるときのみ更新
  const newLeft = (ssState.playerX - camX - 14) + 'px';
  if (_ss.player.style.left !== newLeft) _ss.player.style.left = newLeft;

  // Walking / flip — 状態変化のときのみclassList操作
  if (ssState.moving !== ssState._prevWalking) {
    _ss.char.classList.toggle('walking', ssState.moving);
    ssState._prevWalking = ssState.moving;
  }
  const flip = !ssState.facingRight;
  if (flip !== ssState._prevFlip) {
    _ss.char.classList.toggle('flip', flip);
    ssState._prevFlip = flip;
  }

  ssState.raf = requestAnimationFrame(ssLoop);
}

function renderField(game) {
  const theme  = FIELD_THEMES[game.game_id] || DEFAULT_THEME;
  const layout = MAP_LAYOUT[game.game_id] || {};

  document.getElementById('field-defs').innerHTML  = theme.defs  || '';
  document.getElementById('field-scene').innerHTML = theme.scene || '';

  document.getElementById('field-title').textContent      = game.ui_display.title;
  document.getElementById('field-icon-emoji').textContent = layout.icon || '?';
  document.getElementById('field-icon-label').textContent = game.ui_display.title;
  document.title = game.ui_display.title + ' — THANATOS GAMES';

  buildCharacters(game);

  // clinic: フィールドSVG全体でイベントデリゲーション
  if (game.game_id === 'gendaibyo_clinic') {
    clinicStage = 'exterior';
    document.getElementById('field-svg').addEventListener('click', e => {
      // 外観: 病院グループクリック → 内部へ
      if (clinicStage === 'exterior') {
        const sceneEl = e.target.closest('[data-scene="interior"]');
        if (sceneEl) enterClinicInterior();
        return;
      }
      // 内部: オブジェクトクリック → ダイアログ
      if (clinicStage === 'interior') {
        const objEl = e.target.closest('[data-obj]');
        if (objEl) {
          const obj = CLINIC_OBJECTS[objEl.dataset.obj];
          if (obj) openDialogue(obj, null);
        }
      }
    });
  }
}

function buildCharacters(game) {
  const data      = CHARACTER_DATA[game.game_id];
  const container = document.getElementById('characters');
  container.innerHTML = '';
  if (!data) return;

  data.characters.forEach(char => {
    const el = document.createElement('div');
    el.className = 'character-sprite';
    el.style.left   = char.posX + '%';
    el.style.bottom = (char.posBottom + 38) + 'px'; // +38px for bottom HUD
    el.innerHTML = `
      <div class="char-hint" id="hint-${char.id}">!</div>
      <img src="${char.image}" alt="${char.name}" draggable="false"
           onerror="this.parentElement.style.display='none'">
    `;
    el.addEventListener('click', () => openDialogue(char, el));
    container.appendChild(el);
  });
}

// =====================================================
//  DIALOGUE SYSTEM
// =====================================================
let _dlgChar      = null;
let _dlgLine      = 0;
let _dlgTyping    = false;
let _dlgTimer     = null;

/**
 * モバイル用テキストページ分割
 * 日本語の句読点を優先してmaxChars文字ごとにページを作る。
 * CLICKで続きが出る仕組みと組み合わせて使用。
 */
function paginateText(text, maxChars) {
  if (text.length <= maxChars) return [text];
  const pages = [];
  let rem = text;
  while (rem.length > maxChars) {
    let bp = maxChars;
    // 句読点があれば自然な区切りで分割
    for (let i = maxChars; i > Math.floor(maxChars * 0.5); i--) {
      if ('。、！？…」』\n'.includes(rem[i - 1])) { bp = i; break; }
    }
    pages.push(rem.slice(0, bp));
    rem = rem.slice(bp).replace(/^\n/, '');
  }
  if (rem) pages.push(rem);
  return pages;
}

function openDialogue(char, spriteEl) {
  // すでに同じキャラが話し中なら無視（idで比較）
  const sameChar = _dlgChar && _dlgChar._srcId === char.id;
  if (sameChar && document.getElementById('dialogue-box').classList.contains('open')) return;

  clearInterval(_dlgTimer);

  // モバイル(600px未満): 長いセリフを ~24文字ずつページ分割して CLICK で続きを表示
  let dialogues = char.dialogues;
  if (window.innerWidth < 600) {
    dialogues = char.dialogues.flatMap(d => paginateText(d, 24));
  }

  _dlgChar = { ...char, dialogues, _srcId: char.id };
  _dlgLine = 0;

  const hint = char.id ? document.getElementById('hint-' + char.id) : null;
  if (hint) hint.classList.add('done');

  document.getElementById('dlg-name').textContent = char.name;
  document.getElementById('dialogue-box').classList.add('open');
  typeText(dialogues[0]);
}

function showDlgChoices(choices) {
  const nextEl    = document.getElementById('dlg-next');
  const choicesEl = document.getElementById('dlg-choices');
  nextEl.classList.remove('visible');
  choicesEl.innerHTML = choices.map(c =>
    `<button class="dlg-choice-btn" data-action="${c.action}">${c.label}</button>`
  ).join('');
  choicesEl.classList.add('visible');
  choicesEl.querySelectorAll('.dlg-choice-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (btn.dataset.action === 'openYouTube') {
        window.open('https://youtu.be/yjYuciqh8HE?si=mI5i7yRzIlPts-xS', '_blank');
      }
      closeDialogue();
    });
  });
}

function typeText(text) {
  clearInterval(_dlgTimer); // 二重起動防止
  if (!text) return;

  _dlgTyping = true;
  const nextEl    = document.getElementById('dlg-next');
  const choicesEl = document.getElementById('dlg-choices');
  nextEl.classList.remove('visible');
  choicesEl.innerHTML = '';
  choicesEl.classList.remove('visible');
  const el = document.getElementById('dlg-text');
  el.textContent = '';
  let i = 0;
  const len = text.length;
  _dlgTimer = setInterval(() => {
    if (i < len) {
      el.textContent += text[i];
      i++;
    } else {
      clearInterval(_dlgTimer);
      _dlgTyping = false;
      const isLast = _dlgLine >= _dlgChar.dialogues.length - 1;
      if (isLast && _dlgChar.choices) {
        showDlgChoices(_dlgChar.choices);
      } else {
        nextEl.classList.add('visible');
      }
    }
  }, 38);
}

function advanceDialogue() {
  if (!_dlgChar) return;

  // 選択肢表示中は無視
  if (document.getElementById('dlg-choices').classList.contains('visible')) return;

  // タイピング中はスキップ
  if (_dlgTyping) {
    clearInterval(_dlgTimer);
    _dlgTyping = false;
    document.getElementById('dlg-text').textContent = _dlgChar.dialogues[_dlgLine];
    const isLast = _dlgLine >= _dlgChar.dialogues.length - 1;
    if (isLast && _dlgChar.choices) {
      showDlgChoices(_dlgChar.choices);
    } else {
      document.getElementById('dlg-next').classList.add('visible');
    }
    return;
  }

  _dlgLine++;
  if (_dlgLine < _dlgChar.dialogues.length) {
    typeText(_dlgChar.dialogues[_dlgLine]);
  } else {
    closeDialogue();
  }
}

function closeDialogue() {
  clearInterval(_dlgTimer);
  _dlgTyping = false;
  _dlgChar   = null;
  document.getElementById('dialogue-box').classList.remove('open');
  const choicesEl = document.getElementById('dlg-choices');
  choicesEl.innerHTML = '';
  choicesEl.classList.remove('visible');
}

// =====================================================
//  INIT
// =====================================================
async function init() {
  const params = new URLSearchParams(window.location.search);
  const gameId = params.get('id');
  if (!gameId) { window.location.href = './?from=field'; return; }

  let game;
  try {
    const res  = await fetch('./games.json');
    const data = await res.json();
    game = data.games.find(g => g.game_id === gameId);
  } catch (e) {
    console.error('games.json の読み込みに失敗しました:', e);
  }

  if (!game) { window.location.href = './?from=field'; return; }

  renderField(game);

  // モーダルのコンテンツを事前に組み立て（表示はしない）
  openModal(game);
  closeModal();

  // ヘッダークリック → ゲーム詳細ポップアップ
  document.getElementById('hud-top').addEventListener('click', () => {
    document.getElementById('overlay').classList.add('open');
  });
  document.getElementById('mclose').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  // エントリーアニメーション終了後にオーバーレイを除去
  setTimeout(() => {
    const eo = document.getElementById('entry-overlay');
    if (eo) eo.remove();
  }, 700);

  // ← WORLD / ← ENTRANCE ボタン
  document.getElementById('btn-back').addEventListener('click', () => {
    // clinic 内部にいるときは外観へ戻る
    if (clinicStage === 'interior') {
      exitClinicInterior();
      return;
    }
    // それ以外はワールドマップへ
    const ov = document.getElementById('exit-overlay');
    ov.classList.add('active');
    setTimeout(() => {
      window.location.href = './?from=field';
    }, 240);
  });

  // ダイアログ: クリックで次の台詞 / 閉じる
  document.getElementById('dialogue-box').addEventListener('click', advanceDialogue);
  document.getElementById('dlg-close').addEventListener('click', e => {
    e.stopPropagation();
    closeDialogue();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeDialogue(); }
    if (e.key === 'Enter' || e.key === ' ') advanceDialogue();
  });
}

init();
</script>
